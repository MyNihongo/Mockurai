name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: 10.0.x
  BUILD_CONFIG: Release
  TEST_RESULT_DIRECTORY: TestResults
  ARTIFACT_DIRECTORY: .artifacts
  SCRIPT_DIRECTORY: .build

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "${{ env.DOTNET_VERSION }}"

    - name: Clean output
      shell: bash
      working-directory: "${{ env.SCRIPT_DIRECTORY }}"
      run: |
        chmod +x clean.sh
        ./clean.sh

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration ${{ env.BUILD_CONFIG }} --no-restore

    - name: Run tests
      run: dotnet test --configuration ${{ env.BUILD_CONFIG }} --no-build --results-directory ${{ env.TEST_RESULT_DIRECTORY }}

    - name: Prepare artifacts
      shell: bash
      working-directory: "${{ env.SCRIPT_DIRECTORY }}"
      run: |
        chmod +x prepare_artifacts.sh
        ./prepare_artifacts.sh

    - name: Upload published artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mockurai
        path: "${{ env.ARTIFACT_DIRECTORY }}/*.nupkg"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: "${{ env.TEST_RESULT_DIRECTORY }}/**/*.nupkg"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Placeholder deploy stage
        run: echo "Deploy stage ready"